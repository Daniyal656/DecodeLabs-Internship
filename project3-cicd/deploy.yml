name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: docker build -t daniyal656/cicd-pipeline:latest .

      - name: Push to Docker Hub
        run: docker push daniyal656/cicd-pipeline:latest

      - name: Deploy to EC2
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "$SSH_KEY" > key.pem
          chmod 400 key.pem
          ssh -i key.pem -o StrictHostKeyChecking=no ubuntu@$HOST "
            docker pull daniyal656/cicd-pipeline:latest &&
            docker stop webapp || true &&
            docker rm webapp || true &&
            docker run -d -p 80:5000 --name webapp daniyal656/cicd-pipeline:latest
          "
